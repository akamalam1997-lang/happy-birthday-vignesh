<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Vignesh ❤️</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script src="script.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ========================================================= -->
<!-- Animated Background -->
<!-- ========================================================= -->

<div id="stars"></div>
<div id="hearts"></div>
<div id="particles"></div>


<!-- ========================================================= -->
<!-- Scene 1 -->
<!-- Loading Screen -->
<!-- ========================================================= -->
<div id="loading" class="screen">
    <h2 id="loadingText">0%</h2>
    <div class="progress">
        <div id="loadingBar"></div>
    </div>
</div>

<div id="welcome" class="screen hidden">
    <h1 id="typing"></h1>
    <button id="futureBtn">See My Future ❤️</button>
</div>

<div id="scanner" class="screen hidden">
    <h2 id="scanStatus">Initializing...</h2>
    <div class="progress">
        <div id="scanProgress"></div>
    </div>
</div>

<div id="memories" class="screen hidden">
    <h1>Our Journey ❤️</h1>
</div>

<audio id="bgMusic" loop>
    <source src="assets/music/bg.mp3" type="audio/mpeg">
</audio>

    <section id="memories" class="screen hidden">

    <div class="memory-container">

        <img id="memoryImage" src="assets/photos/wedding.jpg">

        <div class="memory-overlay">

            <h1 id="memoryTitle"></h1>

            <p id="memoryDescription"></p>

        </div>

    </div>

</section>


<!-- ========================================================= -->
<!-- JavaScript -->
<!-- ========================================================= -->

<script src="script.js"></script>

</body>

</html>
